version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: moderation-db
    environment:
      POSTGRES_DB: moderation
      POSTGRES_USER: moderator
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moderator"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - moderation-network

  # Redis (Celery broker & cache)
  redis:
    image: redis:7-alpine
    container_name: moderation-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - moderation-network

  # FastAPI Application
  app:
    build: .
    container_name: moderation-app
    environment:
      - DATABASE_URL=postgresql://moderator:${POSTGRES_PASSWORD:-changeme}@postgres:5432/moderation
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - PORT=8001
      - HOST=0.0.0.0
      - ENVIRONMENT=production
      - OLLAMA_API_URL=${OLLAMA_API_URL:-http://host.docker.internal:11434}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    ports:
      - "8001:8001"
    volumes:
      - ./data:/app/data
      - ./static:/app/static
      - ./templates:/app/templates
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - moderation-network
    restart: unless-stopped

  # Celery Worker - Default Queue
  celery-worker-default:
    build: .
    container_name: moderation-worker-default
    command: celery -A src.workers.celery_app worker -Q default --concurrency=4 --loglevel=info
    environment:
      - DATABASE_URL=postgresql://moderator:${POSTGRES_PASSWORD:-changeme}@postgres:5432/moderation
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - OLLAMA_API_URL=${OLLAMA_API_URL:-http://host.docker.internal:11434}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    volumes:
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - moderation-network
    restart: unless-stopped

  # Celery Worker - High Priority Queue
  celery-worker-high:
    build: .
    container_name: moderation-worker-high
    command: celery -A src.workers.celery_app worker -Q high,critical --concurrency=2 --loglevel=info
    environment:
      - DATABASE_URL=postgresql://moderator:${POSTGRES_PASSWORD:-changeme}@postgres:5432/moderation
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - OLLAMA_API_URL=${OLLAMA_API_URL:-http://host.docker.internal:11434}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    volumes:
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - moderation-network
    restart: unless-stopped

  # Celery Flower (Monitoring)
  flower:
    build: .
    container_name: moderation-flower
    command: celery -A src.workers.celery_app flower --port=5555
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    ports:
      - "5555:5555"
    depends_on:
      - redis
    networks:
      - moderation-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  moderation-network:
    driver: bridge
