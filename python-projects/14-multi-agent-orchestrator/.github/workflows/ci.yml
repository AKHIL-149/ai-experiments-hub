name: CI - Tests and Coverage

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'python-projects/14-multi-agent-orchestrator/**'
      - '!python-projects/14-multi-agent-orchestrator/README.md'
      - '!python-projects/14-multi-agent-orchestrator/docs/**'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'python-projects/14-multi-agent-orchestrator/**'

defaults:
  run:
    working-directory: python-projects/14-multi-agent-orchestrator

jobs:
  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: multi_agent_orchestrator_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
        cache-dependency-path: python-projects/14-multi-agent-orchestrator/requirements.txt

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest-cov pytest-asyncio

    - name: Set environment variables
      run: |
        echo "DATABASE_URL=postgresql://postgres:postgres@localhost:5432/multi_agent_orchestrator_test" >> $GITHUB_ENV
        echo "REDIS_URL=redis://localhost:6379/0" >> $GITHUB_ENV
        echo "TESTING=true" >> $GITHUB_ENV
        echo "LOG_LEVEL=WARNING" >> $GITHUB_ENV

    - name: Run database migrations
      run: |
        alembic upgrade head

    - name: Run unit tests
      run: |
        pytest tests/unit -v --cov=src --cov-report=xml --cov-report=term-missing -m "not llm"

    - name: Run integration tests
      run: |
        pytest tests/integration -v --cov=src --cov-append --cov-report=xml --cov-report=term-missing -m "not llm"

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: python-projects/14-multi-agent-orchestrator/coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

    - name: Archive test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-${{ matrix.python-version }}
        path: |
          python-projects/14-multi-agent-orchestrator/htmlcov/
          python-projects/14-multi-agent-orchestrator/coverage.xml
        retention-days: 7

  lint:
    name: Code Quality Checks
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        cache-dependency-path: python-projects/14-multi-agent-orchestrator/requirements.txt

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black isort mypy pylint

    - name: Run Black (code formatting check)
      run: |
        black --check --diff src/ tests/

    - name: Run isort (import sorting check)
      run: |
        isort --check-only --diff src/ tests/

    - name: Run Flake8 (linting)
      run: |
        flake8 src/ tests/ --max-line-length=100 --extend-ignore=E203,W503

    - name: Run Pylint (static analysis)
      run: |
        pylint src/ --max-line-length=100 --disable=C0111,R0903,R0913
      continue-on-error: true

  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install safety bandit

    - name: Run Safety (dependency vulnerability check)
      run: |
        safety check --json || true

    - name: Run Bandit (security issues check)
      run: |
        bandit -r src/ -ll -f json || true

  build-check:
    name: Docker Build Check
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image
      working-directory: python-projects/14-multi-agent-orchestrator
      run: |
        docker build -t multi-agent-orchestrator:test .

    - name: Test Docker image
      working-directory: python-projects/14-multi-agent-orchestrator
      run: |
        docker run --rm multi-agent-orchestrator:test python -c "import src; print('Import successful')"
