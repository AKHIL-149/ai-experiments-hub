[pytest]
# Pytest configuration for Multi-Agent Task Orchestrator

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Minimum version
minversion = 7.0

# Command line options
addopts =
    # Verbosity
    -v
    --strict-markers
    --strict-config

    # Output
    --tb=short
    --color=yes

    # Coverage (when pytest-cov is installed)
    --cov=src
    --cov-report=html
    --cov-report=term-missing
    --cov-fail-under=80

    # Warnings
    -W error::DeprecationWarning
    -W error::PendingDeprecationWarning

    # Performance
    --maxfail=5

    # Async support
    --asyncio-mode=auto

# Markers for organizing tests
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (slower, require services)
    e2e: End-to-end tests (slowest, full system)
    smoke: Smoke tests (quick sanity checks)
    slow: Tests that take a long time to run
    database: Tests that require database
    redis: Tests that require Redis
    celery: Tests that require Celery worker
    llm: Tests that require LLM API (may incur costs)
    skip_ci: Tests to skip in CI environment

# Test environment variables
env =
    TESTING=true
    LOG_LEVEL=WARNING

# Async timeout
asyncio_mode = auto
timeout = 300

# Ignore paths
norecursedirs =
    .git
    .tox
    dist
    build
    *.egg
    __pycache__
    .venv
    venv
    node_modules
    data
    logs
